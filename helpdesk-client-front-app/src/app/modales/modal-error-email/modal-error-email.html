<div class="modal-backdrop" *ngIf="visible" (click)="cerrarPorBackdrop($event)">
  <div class="modal-container">
    <div class="modal-header">
      <div class="icon-warning">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
      </div>
      <h2>Ticket Creado con Advertencia</h2>
    </div>
    
    <div class="modal-body">
      <p class="message">El ticket fue creado exitosamente, pero no se pudo enviar el correo electrónico de confirmación.</p>
      <div class="alert-box">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
          <line x1="12" y1="9" x2="12" y2="13"></line>
          <line x1="12" y1="17" x2="12.01" y2="17"></line>
        </svg>
        <span>Email inexistente o inválido</span>
      </div>
      <p class="data" *ngIf="data">{{ data }}</p>
      <p class="info">Por favor, verifique la dirección de correo electrónico proporcionada.</p>
    </div>
    
    <div class="modal-footer">
      <button class="btn-primary" (click)="cerrarModal()">Entendido</button>
    </div>
  </div>
</div>
